name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Lightsail
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx tsx node_modules/.bin/prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Prepare standalone artifact
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          cp prisma.config.ts .next/standalone/prisma.config.ts
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs
          mkdir -p .next/standalone/scripts
          cp scripts/seed.ts .next/standalone/scripts/seed.ts
          # Copy Prisma query engine binary (not bundled by Next.js standalone automatically)
          cp -r node_modules/.prisma .next/standalone/node_modules/.prisma

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync artifact to server
        run: |
          rsync -az --delete \
            --exclude='.env.production' \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/heirloom/

      - name: Run migrations & restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} 'bash -s' << 'ENDSSH'
            set -e
            cd /var/www/heirloom
            set -a && source /var/www/heirloom/.env.production && set +a
            npx --yes prisma db push
            npx --yes tsx scripts/seed.ts || true
            pm2 describe heirloom > /dev/null 2>&1 \
              && pm2 reload heirloom --update-env \
              || pm2 start ecosystem.config.cjs
            pm2 save
            echo "Deploy complete"
          ENDSSH
