# /etc/nginx/sites-available/family.kevingaasch.com.conf
# Symlink to /etc/nginx/sites-enabled/ to activate

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name family.kevingaasch.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name family.kevingaasch.com;

    # SSL — managed by certbot; run:
    #   sudo certbot --nginx -d family.kevingaasch.com
    ssl_certificate /etc/letsencrypt/live/family.kevingaasch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family.kevingaasch.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Serve Next.js immutable static chunks directly (long cache)
    location /_next/static/ {
        alias /var/www/heirloom/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve public/ assets directly
    location /public/ {
        alias /var/www/heirloom/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy everything else to the Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow long-running AI streaming responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffer settings for SSE/streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # Upload size limit (document vault)
    client_max_body_size 50M;
}
